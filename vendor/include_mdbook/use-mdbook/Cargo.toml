[package]
name = "use-mdbook"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
lazy_static = "1.4.0"
mdbook-macro = { path = "../mdbook-macro" }
mdbook-shared = { path = "../mdbook-shared" }
once_cell = "1.17.2"
postcard = { version = "1.0.4", features = ["use-std"] }
serde = { version = "1.0.163", features = ["derive"] }
serde_json = "1.0.96"
yazi = "0.2.1"

[dev-dependencies]
dioxus = { version = "0.7.0", features = ["router"] }
dioxus-router = "0.7.0"
tokio = { version = "*", features = ["full"] }

[features]
default = ["manganis"]
manganis = ["mdbook-macro/manganis"]
