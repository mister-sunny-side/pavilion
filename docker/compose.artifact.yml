# Serve a pavilion-web artifact published by GitHub Actions on master.
#
# 1. Download the artifact from a successful master CI run, e.g.:
#      gh run download <run-id> -n pavilion-web -D docker/artifact
#    Or from the Actions UI: download pavilion-web and unzip into docker/artifact/
#    so that docker/artifact/server and docker/artifact/public/ exist.
#
# 2. From the repo root:
#      docker compose -f docker/compose.artifact.yml up --build
#
# Site: http://localhost:8080
#
# Note: CI builds linux/amd64 binaries; platform is pinned so this works on Apple Silicon too.

services:
  pavilion:
    platform: linux/amd64
    build:
      context: ./artifact
      dockerfile: ../Dockerfile.artifact
    image: pavilion:artifact
    ports:
      - "${PORT:-8080}:8080"
    environment:
      IP: "0.0.0.0"
      PORT: "8080"
      DIOXUS_PUBLIC_PATH: "/app/public"
    restart: unless-stopped
